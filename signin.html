<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Cinémathèque</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg-void:#070709; --bg-card:#1a1a26;
  --gold:#c9a84c; --gold-light:#e8c97a;
  --crimson:#a8243c; --crimson-bright:#e02e50;
  --text-prime:#f0ede8; --text-secondary:#9a9498;
  --border:rgba(201,168,76,.15);
}
* { margin:0; padding:0; box-sizing:border-box }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg-void); color:var(--text-prime);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1920');
  background-size:cover; background-position:center;
}
.overlay { position:fixed; inset:0; background:rgba(7,7,9,.85); backdrop-filter:blur(8px); z-index:1 }
.container { position:relative; z-index:2; width:100%; max-width:420px; padding:20px }
.logo {
  font-family:'Bebas Neue',sans-serif; font-size:42px;
  letter-spacing:4px; color:var(--gold); text-align:center; margin-bottom:40px;
  text-shadow:0 0 30px rgba(201,168,76,.3);
}
.logo span { color:var(--crimson-bright) }
.card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:8px; padding:40px 32px;
}
h2 { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:8px; text-align:center }
.subtitle { text-align:center; color:var(--text-secondary); font-size:14px; margin-bottom:32px }
.form-group { margin-bottom:20px }
label { display:block; font-size:13px; font-weight:500; margin-bottom:8px; color:var(--text-secondary) }
input {
  width:100%; background:rgba(255,255,255,.04); border:1px solid var(--border);
  border-radius:4px; padding:12px 16px; color:var(--text-prime);
  font-family:'DM Sans',sans-serif; font-size:14px; outline:none;
  transition:border-color .3s;
}
input:focus { border-color:var(--gold) }
.btn {
  width:100%; background:var(--gold); color:#070709;
  border:none; border-radius:4px; padding:14px;
  font-family:'DM Sans',sans-serif; font-weight:600; font-size:14px;
  cursor:pointer; transition:all .3s; margin-top:8px;
}
.btn:hover { background:var(--gold-light); transform:translateY(-2px) }
.divider {
  text-align:center; margin:24px 0; color:var(--text-secondary);
  font-size:13px; position:relative;
}
.divider::before, .divider::after {
  content:''; position:absolute; top:50%; width:40%;
  height:1px; background:var(--border);
}
.divider::before { left:0 }
.divider::after { right:0 }
.link {
  text-align:center; margin-top:24px; font-size:14px;
  color:var(--text-secondary);
}
.link a {
  color:var(--gold); text-decoration:none; font-weight:500;
  transition:opacity .3s;
}
.link a:hover { opacity:.7 }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
  <div class="logo">CINÉ<span>THÈQUE</span></div>
  <div class="card">
    <h2>Sign In</h2>
    <p class="subtitle">Welcome back to the cinema experience</p>
    <form onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn"><i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Sign In</button>
    </form>
    <div class="divider">OR</div>
    <div class="link">Don't have an account? <a href="login.html">Create one</a></div>
  </div>
</div>
<script>
function handleSignIn(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  // Store user session
  localStorage.setItem('cine_user', JSON.stringify({email, loggedIn: true}));
  
  // Redirect to main page
  window.location.href = 'kavinesh.html';
}
</script>
</body>
</html>
